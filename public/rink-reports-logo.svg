<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 380" width="740" height="380" role="img" aria-label="Rink Reports">
  <defs>
    <clipPath id="rink">
      <rect x="26" y="26" width="688" height="328" rx="92" ry="92"/>
    </clipPath>
  </defs>

  <!-- Ice surface -->
  <rect x="26" y="26" width="688" height="328" rx="92" ry="92" fill="#eaf2f9"/>

  <!-- Rink markings -->
  <g clip-path="url(#rink)" fill="none">
    <!-- Goal lines -->
    <line x1="118" y1="26" x2="118" y2="354" stroke="#d23b3b" stroke-width="3"/>
    <line x1="622" y1="26" x2="622" y2="354" stroke="#d23b3b" stroke-width="3"/>
    <!-- Blue lines -->
    <line x1="278" y1="26" x2="278" y2="354" stroke="#1f4ea1" stroke-width="9"/>
    <line x1="462" y1="26" x2="462" y2="354" stroke="#1f4ea1" stroke-width="9"/>
    <!-- Center red line -->
    <line x1="370" y1="26" x2="370" y2="354" stroke="#d23b3b" stroke-width="6"/>

    <!-- Center circle -->
    <circle cx="370" cy="190" r="50" stroke="#1f4ea1" stroke-width="3"/>
    <circle cx="370" cy="190" r="6" fill="#1f4ea1"/>

    <!-- End-zone faceoff circles -->
    <g stroke="#d23b3b" stroke-width="3">
      <circle cx="176" cy="116" r="42"/>
      <circle cx="176" cy="264" r="42"/>
      <circle cx="564" cy="116" r="42"/>
      <circle cx="564" cy="264" r="42"/>
    </g>
    <g fill="#d23b3b">
      <circle cx="176" cy="116" r="6"/>
      <circle cx="176" cy="264" r="6"/>
      <circle cx="564" cy="116" r="6"/>
      <circle cx="564" cy="264" r="6"/>
    </g>

    <!-- Neutral-zone faceoff dots -->
    <g fill="#d23b3b">
      <circle cx="318" cy="116" r="6"/>
      <circle cx="318" cy="264" r="6"/>
      <circle cx="422" cy="116" r="6"/>
      <circle cx="422" cy="264" r="6"/>
    </g>
  </g>

  <!-- Rink border -->
  <rect x="26" y="26" width="688" height="328" rx="92" ry="92" fill="none" stroke="#0b2545" stroke-width="10"/>

  <!-- Wordmark -->
  <g font-family="Anton, Impact, 'Arial Narrow', sans-serif" font-weight="700" text-anchor="middle" fill="#6cc04a" stroke="#ffffff" stroke-width="7" paint-order="stroke fill" stroke-linejoin="round">
    <text x="372" y="178" font-size="118" letter-spacing="2">RINK</text>
    <text x="372" y="272" font-size="78" letter-spacing="2">REPORTS</text>
  </g>
</svg>
