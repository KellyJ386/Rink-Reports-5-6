# Supabase local development configuration.
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "rink-reports"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Reject known-leaked passwords at sign-up / password-change via the
# HaveIBeenPwned Pwned Passwords API ("Prevent Leaked Passwords"). Codified here
# as config-as-code; the RLS-isolation CI job does not run `supabase start`, so
# this only reaches the hosted project via `supabase config push` or the
# dashboard toggle (Authentication → Sign In / Providers → Passwords).
password_hibp_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
