name: RLS Isolation Tests

# Runs supabase/tests/rls_isolation.sql against a freshly-migrated local
# Supabase stack on every push to main and every PR. The test script wraps
# everything in BEGIN ... ROLLBACK and raises an exception on any failed
# assertion, so a non-zero psql exit means at least one cross-tenant gate
# regressed.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "supabase/config.toml"
      - ".github/workflows/rls-isolation.yml"

# Don't pile up concurrent runs on the same ref.
concurrency:
  group: rls-isolation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Boot local Supabase stack
        # `supabase start` applies migrations from supabase/migrations on boot.
        run: supabase start

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run RLS isolation tests
        env:
          # supabase/config.toml pins the local DB to 54322.
          PGURL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          psql "$PGURL" \
            -v ON_ERROR_STOP=1 \
            --echo-errors \
            -f supabase/tests/rls_isolation.sql

      - name: Tear down
        if: always()
        run: supabase stop || true
