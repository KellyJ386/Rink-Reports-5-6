name: Migration Prefix Check

# Guards the monotonic 14-digit prefix convention for supabase/migrations/
# (see CLAUDE.md). A prefix collision means two files would claim the same
# ledger `version`, which breaks `supabase db reset` / `db push` / `migration
# list` for everyone.
#
# Two layers, because one is not enough:
#
#  1. check-prefixes (PRs only) — fails when a file ADDED in this PR shares a
#     prefix with another file. Gives targeted per-file annotations early.
#
#  2. check-tree-unique (PRs AND push to main) — scans the WHOLE tree for any
#     duplicate prefix. This catches the gap the PR-scoped check cannot: two
#     PRs branched from the same base each grab the next number, each passes
#     in isolation (neither tree contains the other's file yet), and they only
#     collide once both merge. Running on push to main means such a collision
#     fails visibly on main immediately instead of lying dormant.

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migration-prefix-check.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migration-prefix-check.yml"

jobs:
  check-prefixes:
    # PR-scoped: only the files this PR adds, with friendly annotations.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify no new migration prefix collisions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Files added (status A) in this PR under supabase/migrations/.
          added=$(
            git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- \
              supabase/migrations/ || true
          )

          if [ -z "$added" ]; then
            echo "No new migration files in this PR."
            exit 0
          fi

          fail=0
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            name=$(basename "$path")
            prefix=$(printf '%s\n' "$name" | awk -F'_' '{print $1}')
            case "$prefix" in
              ''|*[!0-9]*)
                echo "::error file=$path::Migration filename must start with a numeric prefix (got '$prefix')."
                fail=1
                continue
                ;;
            esac
            matches=$(ls supabase/migrations/ | grep "^${prefix}_" || true)
            count=$(printf '%s\n' "$matches" | grep -c . || true)
            if [ "$count" -gt 1 ]; then
              echo "::error file=$path::Prefix '$prefix' collides with existing migration(s):"
              printf '%s\n' "$matches" | sed 's/^/    /'
              fail=1
            fi
          done <<< "$added"

          if [ "$fail" -ne 0 ]; then
            echo
            echo "Rename your new migration to use the next free monotonic prefix."
            exit 1
          fi
          echo "No new prefix collisions introduced."

  check-tree-unique:
    # Whole-tree: every prefix in supabase/migrations/ must be unique. Runs on
    # PRs and on push to main so post-merge collisions cannot hide.
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify every migration prefix is unique across the tree
        run: |
          set -euo pipefail

          fail=0

          # Every filename must start with a numeric prefix.
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            prefix=$(printf '%s\n' "$name" | awk -F'_' '{print $1}')
            case "$prefix" in
              ''|*[!0-9]*)
                echo "::error::Migration '$name' must start with a numeric prefix (got '$prefix')."
                fail=1
                ;;
            esac
          done <<< "$(ls supabase/migrations/ 2>/dev/null || true)"

          # No prefix may appear more than once.
          dups=$(
            ls supabase/migrations/ 2>/dev/null \
              | sed -E 's/^([0-9]+)_.*/\1/' \
              | sort | uniq -d || true
          )
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration prefixes in supabase/migrations/:"
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              ls supabase/migrations/ | grep "^${p}_" | sed 's/^/    /'
            done <<< "$dups"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo
            echo "Two migrations sharing a prefix claim the same ledger version."
            echo "Rename the newer one to the next free monotonic prefix."
            exit 1
          fi
          echo "All migration prefixes are unique."
