name: E2E Branch Run

# On-demand Playwright run of the full e2e suite from THIS branch against a
# deployed environment (production by default). Unlike the nightly `E2E`
# workflow, credentials are not read from E2E_* repo secrets (which are not
# configured); they are fetched at runtime from the locked-down
# `e2e_temp_credentials` table over the existing SUPABASE_DB_URL repo secret,
# masked, and exported. The table holds throwaway test-account passwords only
# and is dropped when the module-check session that seeded it cleans up.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL to test"
        required: false
        default: "https://www.rinkreports.com"
        type: string

concurrency:
  group: e2e-branch-run
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      E2E_BASE_URL: ${{ inputs.url }}
      # Non-secret seed deep links (see e2e/README.md "Staging data prerequisites").
      E2E_ICE_DEPTH_LAYOUT_SLUG: rink-a
      E2E_FACILITY_B_REPORT_PATH: /reports/incidents/5b81c73b-21e1-4d66-8104-45719ce57fad
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Fetch E2E credentials from database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret not configured — cannot fetch e2e credentials."
            exit 1
          fi
          ROWS=$(psql "$SUPABASE_DB_URL" -At -F '|' \
            -c "select role_key, password from public.e2e_temp_credentials")
          if [ -z "$ROWS" ]; then
            echo "::error::e2e_temp_credentials table is empty or missing — seed it before dispatching."
            exit 1
          fi
          while IFS='|' read -r ROLE PW; do
            [ -z "$ROLE" ] && continue
            echo "::add-mask::$PW"
            echo "E2E_${ROLE}_PASSWORD=$PW" >> "$GITHUB_ENV"
          done <<< "$ROWS"
          echo "Loaded credentials for: $(echo "$ROWS" | cut -d'|' -f1 | tr '\n' ' ')"

      # Fail fast if the seeded test accounts cannot actually authenticate —
      # a 45-minute suite run is pointless if the password grant is broken.
      - name: Auth preflight (admin test account)
        run: |
          set -euo pipefail
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxYmRnd2xoYmhhYnNpYmpnd21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzUwNDIsImV4cCI6MjA5MzY1MTA0Mn0.uxjeuysN_MR2XjlEYz8ZDyTimzPliuUxoYbEdOj4WfM"
          STATUS=$(curl -s -o /tmp/auth.json -w "%{http_code}" --max-time 30 \
            -X POST "https://bqbdgwlhbhabsibjgwmk.supabase.co/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON_KEY" -H "Content-Type: application/json" \
            -d "{\"email\":\"admin-test@rinkreports.com\",\"password\":\"$E2E_ADMIN_PASSWORD\"}")
          echo "Password grant -> $STATUS"
          if [ "$STATUS" != "200" ]; then
            grep -o '"error_code":"[^"]*"\|"msg":"[^"]*"\|"error_description":"[^"]*"' /tmp/auth.json || true
            echo "::error::Seeded admin test account cannot log in (HTTP $STATUS)."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E suite
        run: pnpm test:e2e

      # Upload the report ALWAYS (not just on failure): this run's REPORT.md,
      # results.json, and walkthrough screenshots are the deliverable.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 14
          if-no-files-found: warn
